services:
  postgres:
    image: postgres:15-alpine
    container_name: events-history-postgres
    environment:
      POSTGRES_DB: "events_history"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
    ports:
      - "5433:5432"
    volumes:
      - events-history-postgres:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d events_history" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - events-history-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: events-history-rabbitmq
    user: "rabbitmq:rabbitmq"
    restart: unless-stopped
    ports:
      - "${RABBITMQ_AMQP_PORT:-5672}:5672"
      - "${RABBITMQ_UI_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE:-secret-cookie-for-dev}
    command: >
      sh -c "
        rabbitmq-server &
        sleep 20;
        rabbitmqadmin declare queue name=notification durable=true;
        rabbitmqadmin declare queue name=someQueue durable=true;
        rabbitmqadmin declare queue name=TECH_PRODUCT_RELATION durable=true;
        rabbitmqadmin declare queue name=package_queue durable=true;
        rabbitmqadmin declare queue name=business_capability_queue durable=true;
        rabbitmqadmin declare queue name=product_queue durable=true;
        wait
      "
    volumes:
      - events-history-rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - events-history-network

  events-history:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: events-history-app
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      APP_AMBASSADOR_AUTH: "false"
      SPRING_RABBITMQ_HOST: ${RABBITMQ_HOST:-events-history-rabbitmq}
      SPRING_RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      SPRING_RABBITMQ_VIRTUAL_HOST: ${RABBITMQ_VHOST:-/}
      SPRING_RABBITMQ_TEMPLATE_EXCHANGE: ${RABBITMQ_EXCHANGE:-events.history.exchange}
      SPRING_RABBITMQ_TEMPLATE_ROUTING_KEY: ${RABBITMQ_ROUTING_KEY:-events.history}
      SPRING_DATASOURCE_URL: jdbc:postgresql://${POSTGRES_HOST:-events-history-postgres}:5432/${POSTGRES_DB:-events_history}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_JPA_HIBERNATE_DDL_AUTO: "update"
      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: "entity_events"
      INTEGRATION_AUTHSSO_SERVER_URL: "http://auth-service:8080"
      SPRING_FLYWAY_DEFAULT_SCHEMA: "entity_events"
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_CLEAN_DISABLED: "true"
      OTEL_SDK_DISABLED: "true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    ports:
      - "${APP_PORT:-8080}:8080"
    networks:
      - events-history-network
    restart: unless-stopped

networks:
  events-history-network:
    driver: bridge

volumes:
  events-history-postgres:
  events-history-rabbitmq: